<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  font-family: "Lato", sans-serif;
  margin: 0;
  padding: 0;
}

.sidenav {
  height: 100%;
  width: 0;
  position: fixed;
  z-index: 1;
  top: 0;
  left: 0;
  background-color: #111;
  overflow-x: hidden;
  transition: 0.5s;
  padding-top: 60px;
}

.sidenav a {
  padding: 8px 8px 8px 32px;
  text-decoration: none;
  font-size: 25px;
  color: #818181;
  display: block;
  transition: 0.3s;
}

.sidenav a:hover {
  color: #f1f1f1;
}

.sidenav .closebtn {
  position: absolute;
  top: 0;
  right: 25px;
  font-size: 36px;
  margin-left: 50px;
}

.submenu {
  display: none;
  margin-left: 32px;
}

.sidenav .submenu a {
  font-size: 20px;
}

@media screen and (max-height: 450px) {
  .sidenav {padding-top: 15px;}
  .sidenav a {font-size: 18px;}
  .sidenav .submenu a {font-size: 16px;}
}

.header {
  display: flex;
  align-items: center;
  padding: 10px;
  background-color: #f4f4f4;
  box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
}

.hamburger {
  font-size: 30px;
  cursor: pointer;
  margin-right: 15px;
}

.logo-container img {
  height: 40px;
  width: auto;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- Sidebar -->
<div id="mySidenav" class="sidenav">
  <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
  <a href="#">Home</a>
  <a href="javascript:void(0)" onclick="toggleSubmenu()">Notes &#9662;</a>
  <div id="notesSubmenu" class="submenu">
    <a href="#">CSE</a>
    <a href="#">ECE</a>
    <a href="#">MEE</a>
    <a href="#">EEE</a>
  </div>
  <a href="#">NPTEL</a>
</div>

<!-- Header with Hamburger Icon and Logo -->
<div class="header">
  <span class="hamburger" onclick="openNav()">&#9776;</span>
  <div class="logo-container">
    <img src="VITNotes.jpg" alt="Logo">
  </div>
</div>

<script>
function openNav() {
  document.getElementById("mySidenav").style.width = "250px";
}

function closeNav() {
  document.getElementById("mySidenav").style.width = "0";
}

function toggleSubmenu() {
  const submenu = document.getElementById("notesSubmenu");
  if (submenu.style.display === "block") {
    submenu.style.display = "none";
  } else {
    submenu.style.display = "block";
  }
}
</script>
   
</body>
</html>
